name: Deploy Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn --frozen-lockfile

      - name: Export docs
        working-directory: packages/docs
        run: |
          npx mintlify export --output export.zip
          unzip -o export.zip -d out

      - name: Rewrite paths for /sinux base
        working-directory: packages/docs
        run: |
          BASE="/sinux"

          # HTML: rewrite root-relative href, src, content attributes
          find out -name '*.html' -exec sed -i \
            -e "s|href=\"/|href=\"${BASE}/|g" \
            -e "s|src=\"/|src=\"${BASE}/|g" \
            -e "s|content=\"/|content=\"${BASE}/|g" \
            -e "s|href=\"${BASE}${BASE}/|href=\"${BASE}/|g" \
            -e "s|src=\"${BASE}${BASE}/|src=\"${BASE}/|g" \
            -e "s|content=\"${BASE}${BASE}/|content=\"${BASE}/|g" \
            -e "s|href=\"${BASE}/https|href=\"https|g" \
            -e "s|content=\"${BASE}/https|content=\"https|g" \
            {} +

          # JS: rewrite asset paths and Next.js router basePath
          find out -name '*.js' -exec sed -i \
            -e "s|\"/_next/|\"${BASE}/_next/|g" \
            -e "s|\"/_mintlify/|\"${BASE}/_mintlify/|g" \
            -e "s|addPathPrefix)(e,\"\")|addPathPrefix)(e,\"${BASE}\")|g" \
            -e "s|basePath:\"\"|basePath:\"${BASE}\"|g" \
            {} +

          # 404.html: copy index.html so GitHub Pages serves the SPA shell
          # for any route, letting the client-side router handle navigation
          cp out/index.html out/404.html

      - uses: actions/configure-pages@v4
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/out

      - id: deployment
        uses: actions/deploy-pages@v4
