name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - run: yarn --frozen-lockfile

      - name: Build core
        run: cd packages/core && ../../node_modules/.bin/rollup -c ../../rollup.config.mjs

      - name: Build react
        run: cd packages/react && ../../node_modules/.bin/rollup -c ../../rollup.config.mjs

      - name: Build tanstack-query
        run: cd packages/tanstack-query && ../../node_modules/.bin/rollup -c ../../rollup.config.mjs

      - name: Build apollo
        run: cd packages/apollo && ../../node_modules/.bin/rollup -c ../../rollup.config.mjs

      - name: Run tests
        run: npx vitest run

      # Trusted publishers: OIDC auth, no NPM_TOKEN needed
      # Requires npm >= 11.5.1 for automatic provenance
      # Configure each package at npmjs.com > Settings > Trusted Publishing

      - name: Publish @sinuxjs/core
        run: cd packages/core && npm publish --access public || true

      - name: Publish @sinuxjs/react
        run: cd packages/react && npm publish --access public || true

      - name: Publish @sinuxjs/tanstack-query
        run: cd packages/tanstack-query && npm publish --access public || true

      - name: Publish @sinuxjs/apollo
        run: cd packages/apollo && npm publish --access public || true

      - name: Package plugin
        run: mkdir -p dist && cd plugins/sinux-plugin && zip -r ../../dist/sinux-plugin.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --generate-notes dist/sinux-plugin.zip || gh release upload "$TAG" dist/sinux-plugin.zip --clobber
